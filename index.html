const sbHeaders = { "Content-Type": "application/json", "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` };

const db = {
  async getItems() {
    try {
      const r = await fetch(`${SUPABASE_URL}/rest/v1/sale_items?select=*&order=id.asc`, { headers: sbHeaders });
      const data = await r.json();
      return Array.isArray(data) && data.length > 0 ? data : null;
    } catch { return null; }
  },
  async saveItems(items) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/sale_items`, {
      method: "POST",
      headers: { ...sbHeaders, "Prefer": "resolution=merge-duplicates,return=minimal" },
      body: JSON.stringify(items)
    });
    if (!r.ok) throw new Error(`saveItems failed: ${r.status}`);
    const ids = items.map(i => i.id).join(",");
    if (ids) await fetch(`${SUPABASE_URL}/rest/v1/sale_items?id=not.in.(${ids})`, { method: "DELETE", headers: { ...sbHeaders, "Prefer": "return=minimal" } });
  },
  async getPhotos() {
    try {
      const r = await fetch(`${SUPABASE_URL}/rest/v1/apt_photos?select=*&order=sort_order.asc`, { headers: sbHeaders });
      const data = await r.json();
      return Array.isArray(data) ? data : [];
    } catch { return []; }
  },
  async savePhotos(photos) {
    if (photos.length === 0) {
      await fetch(`${SUPABASE_URL}/rest/v1/apt_photos`, { method: "DELETE", headers: { ...sbHeaders, "Prefer": "return=minimal" } });
      return;
    }
    const withOrder = photos.map((p, i) => ({ ...p, sort_order: i }));
    const r = await fetch(`${SUPABASE_URL}/rest/v1/apt_photos`, {
      method: "POST",
      headers: { ...sbHeaders, "Prefer": "resolution=merge-duplicates,return=minimal" },
      body: JSON.stringify(withOrder)
    });
    if (!r.ok) throw new Error(`savePhotos failed: ${r.status}`);
    const ids = photos.map(p => p.id).join(",");
    if (ids) await fetch(`${SUPABASE_URL}/rest/v1/apt_photos?id=not.in.(${ids})`, { method: "DELETE", headers: { ...sbHeaders, "Prefer": "return=minimal" } });
  },
};

function normalizeDropbox(url) {
  if (!url) return url;
  if (url.includes("dropbox.com")) {
    return url
      .replace("www.dropbox.com", "dl.dropboxusercontent.com")
      .replace(/[?&]dl=\d/, "")
      .replace(/[?&]raw=\d/, "");
  }
  return url;
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState("public"); // public | gallery | login | admin
  const [items, setItems] = useState([]);
  const [photos, setPhotos] = useState([]);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    async function load() {
      const [dbItems, dbPhotos, dbSettings] = await Promise.all([db.getItems(), db.getPhotos(), db.getSettings()]);
      setItems(dbItems || INITIAL_ITEMS);
      setPhotos(dbPhotos || []);
      setSettings(dbSettings || DEFAULT_SETTINGS);
      setLoaded(true);
    }
    load();
  }, []);

  async function saveItems(v) { setItems(v); await db.saveItems(v); }
  async function savePhotos(v) { setPhotos(v); await db.savePhotos(v); }
  async function saveSettings(v) { setSettings(v); await db.saveSettings(v); }

  if (!loaded) return <div style={{ background: "#FAFAF8", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: "#8A8A82", fontFamily: "'DM Sans',sans-serif", fontSize: "0.85rem", letterSpacing: "0.1em", textTransform: "uppercase" }}>Loading…</div>;

  if (view === "login") return <AdminLogin onSuccess={() => setView("admin")} onBack={() => setView("public")} />;
  if (view === "admin") return <AdminPanel items={items} saveItems={saveItems} photos={photos} savePhotos={savePhotos} settings={settings} saveSettings={saveSettings} onBack={() => setView("public")} />;
  if (view === "gallery") return <GalleryPage photos={photos} onBack={() => setView("public")} />;
  return <PublicSite items={items} photos={photos} settings={settings} onAdminClick={() => setView("login")} onGalleryClick={() => setView("gallery")} />;
}

    return matchRoom && matchSearch;
  }), [items, roomFilter, search]);

  const allRooms = useMemo(() => [...new Set(items.map(i => i.room))], [items]);
  const rooms = useMemo(() => [...new Set(filtered.map(i => i.room))], [filtered]);
  const available = items.filter(i => i.status === "available").length;
  const sold = items.filter(i => i.status === "sold").length;

  return (
    <div style={S.page}>
      <header style={{ ...S.hero, paddingBottom: settings.heroImage ? "28px" : "44px" }}>

  const [saved, setSaved] = useState(false);
  const [saveError, setSaveError] = useState(false);
  const [roomFilter, setRoomFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [showAddForm, setShowAddForm] = useState(false);
  const [activeTab, setActiveTab] = useState("items");
  const [newItem, setNewItem] = useState({ room: ROOMS[0], name: "", retail: "", sale: "", deposit: 0, large: false, status: "available", photo: "", link: "" });
  const [newPhotoUrl, setNewPhotoUrl] = useState("");
  const [newPhotoCaption, setNewPhotoCaption] = useState("");

  const visibleItems = useMemo(() => localItems.filter(item => {
    const matchRoom = roomFilter === "all" || item.room === roomFilter;
    const matchSearch = !search || item.name.toLowerCase().includes(search.toLowerCase());
    return matchRoom && matchSearch;
  }), [localItems, roomFilter, search]);

  function updateItem(id, field, value) { setLocalItems(prev => prev.map(i => i.id === id ? { ...i, [field]: value } : i)); setSaved(false); }
  function deleteItem(id) { if (!confirm("Delete this item?")) return; setLocalItems(prev => prev.filter(i => i.id !== id)); setSaved(false); }

  function normalizePhotoUrl(url) {
    if (url.includes("dropbox.com")) {
      return url.replace("www.dropbox.com", "dl.dropboxusercontent.com").replace(/[?&]dl=\d/, "").replace(/[?&]raw=\d/, "");
    }
    return url;
  }

  function addPhoto() {
    if (!newPhotoUrl.trim()) return;
    setLocalPhotos(prev => [...prev, { id: Date.now(), url: normalizePhotoUrl(newPhotoUrl.trim()), caption: newPhotoCaption.trim() }]);
    setNewPhotoUrl(""); setNewPhotoCaption(""); setSaved(false);
  }
  function deletePhoto(id) { setLocalPhotos(prev => prev.filter(p => p.id !== id)); setSaved(false); }
  function movePhoto(id, dir) {
    setLocalPhotos(prev => {
      const idx = prev.findIndex(p => p.id === id);
      const next = idx + dir;
      if (next < 0 || next >= prev.length) return prev;
      const arr = [...prev]; [arr[idx], arr[next]] = [arr[next], arr[idx]]; return arr;
    });
    setSaved(false);
  }
  function updatePhotoCaption(id, caption) { setLocalPhotos(prev => prev.map(p => p.id === id ? { ...p, caption } : p)); setSaved(false); }

  async function handleSave() {
    setSaving(true);
    setSaved(false);
    setSaveError(false);
    try {
      await Promise.all([
        saveItems(localItems),
        savePhotos(localPhotos),
        saveSettings(localSettings),
      ]);
      setSaved(true);
      setTimeout(() => setSaved(false), 4000);
    } catch(e) {
      console.error("Save failed:", e);
      setSaveError(true);
      setTimeout(() => setSaveError(false), 6000);
    }
    setSaving(false);
  }

  function addItem() {
    if (!newItem.name.trim()) return;
    const item = { ...newItem, id: Date.now(), retail: Number(newItem.retail) || 0, sale: Number(newItem.sale) || 0, deposit: Number(newItem.deposit) || 0 };
    setLocalItems(prev => [...prev, item]);
    setNewItem({ room: ROOMS[0], name: "", retail: "", sale: "", deposit: 0, large: false, status: "available", photo: "", link: "" });
    setShowAddForm(false); setSaved(false);
  }

  const stats = {
    available: localItems.filter(i => i.status === "available").length,
    deposit: localItems.filter(i => i.status === "deposit").length,
    sold: localItems.filter(i => i.status === "sold").length,
    revenue: localItems.filter(i => i.status !== "available").reduce((s, i) => s + i.sale, 0),
  };

  return (
    <div style={S.adminWrap}>
      <div style={S.adminHeader}>
        <h1 style={S.adminTitle}>Sale Admin</h1>
        <div style={{ display: "flex", gap: "8px" }}>
          <button onClick={handleSave} style={{ ...S.adminSaveBtn, background: saveError ? "#8B2020" : saved ? "#1A5C2A" : "#1C1C1A" }}>{saving ? "Saving…" : saveError ? "Save Failed ✗" : saved ? "Saved ✓" : "Save All"}</button>
          <button onClick={onBack} style={{ ...S.adminSaveBtn, background: "#4A4A44" }}>← Public View</button>
        </div>
      </div>

      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: "1px", background: "#E0DBD3", borderBottom: "1px solid #E0DBD3" }}>
        {[{ label: "Available", val: stats.available, color: "#1A5C2A" }, { label: "Deposit Taken", val: stats.deposit, color: "#C4522A" }, { label: "Sold", val: stats.sold, color: "#4A4A44" }, { label: "Revenue", val: fmt(stats.revenue), color: "#C4522A" }].map(s => (
          <div key={s.label} style={{ background: "#FAFAF8", padding: "14px 16px", textAlign: "center" }}>
            <div style={{ fontSize: "0.65rem", letterSpacing: "0.1em", textTransform: "uppercase", color: "#8A8A82", marginBottom: "4px" }}>{s.label}</div>
            <div style={{ fontSize: "1.4rem", fontWeight: 500, color: s.color }}>{s.val}</div>
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div style={{ background: "#F2EFE9", borderBottom: "1px solid #E0DBD3", display: "flex" }}>
        {["items", "photos", "settings"].map(tab => (
          <button key={tab} onClick={() => setActiveTab(tab)} style={{ background: "transparent", border: "none", borderBottom: `2px solid ${activeTab === tab ? "#C4522A" : "transparent"}`, padding: "12px 20px", fontFamily: "inherit", fontSize: "0.78rem", letterSpacing: "0.1em", textTransform: "uppercase", color: activeTab === tab ? "#C4522A" : "#6B6B65", cursor: "pointer", fontWeight: activeTab === tab ? 500 : 400 }}>
            {tab === "items" ? `Items (${localItems.length})` : tab === "photos" ? `Photos (${localPhotos.length})` : "Settings"}
          </button>
        ))}
      </div>

      {/* Photos Tab */}
      {activeTab === "photos" && (
        <div>
          <div style={{ background: "#FEF3EE", borderBottom: "1px solid #E0DBD3", padding: "16px 20px" }}>
            <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: "1.1rem", color: "#C4522A", marginBottom: "12px" }}>Add Apartment Photo</div>
            <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr auto", gap: "10px", alignItems: "end" }}>
              <div>
                <div style={S.adminLabel}>Image URL (Dropbox, Imgur, Google Photos…)</div>
                <input style={S.adminInput} value={newPhotoUrl} onChange={e => setNewPhotoUrl(e.target.value)} placeholder="Paste any image link — Dropbox links auto-converted" onKeyDown={e => e.key === "Enter" && addPhoto()} />
              </div>
              <div>
                <div style={S.adminLabel}>Caption (optional)</div>
                <input style={S.adminInput} value={newPhotoCaption} onChange={e => setNewPhotoCaption(e.target.value)} placeholder="e.g. Living room" onKeyDown={e => e.key === "Enter" && addPhoto()} />
              </div>
              <button onClick={addPhoto} style={S.adminAddBtn}>Add</button>
            </div>
          </div>
          {localPhotos.length === 0
            ? <div style={{ padding: "48px", textAlign: "center", color: "#8A8A82", fontSize: "0.85rem" }}>No photos yet. Add your first apartment photo above.</div>
            : <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(260px,1fr))", gap: "1px", background: "#E0DBD3" }}>
                {localPhotos.map((photo, idx) => (
                  <div key={photo.id} style={S.adminCard}>
                    <div style={{ width: "100%", height: "140px", background: "#F2EFE9", borderRadius: "3px", overflow: "hidden" }}>
                      <img src={photo.url} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} onError={e => { e.target.style.opacity = 0.15; }} />
                    </div>
                    <div><div style={S.adminLabel}>Caption</div><input style={S.adminInput} value={photo.caption} onChange={e => updatePhotoCaption(photo.id, e.target.value)} placeholder="e.g. Living room" /></div>
                    <div style={{ display: "flex", gap: "6px", alignItems: "center" }}>
                      <span style={{ fontSize: "0.67rem", color: "#8A8A82", flex: 1 }}>Photo {idx + 1} of {localPhotos.length}</span>
                      <button onClick={() => movePhoto(photo.id, -1)} disabled={idx === 0} style={{ ...S.adminDeleteBtn, opacity: idx === 0 ? 0.3 : 1 }}>↑</button>
                      <button onClick={() => movePhoto(photo.id, 1)} disabled={idx === localPhotos.length - 1} style={{ ...S.adminDeleteBtn, opacity: idx === localPhotos.length - 1 ? 0.3 : 1 }}>↓</button>
                      <button onClick={() => deletePhoto(photo.id)} style={{ ...S.adminDeleteBtn, color: "#C4522A", borderColor: "#F0C4A8" }}>✕</button>
                    </div>
                  </div>
                ))}
              </div>
          }
        </div>
      )}

      {/* Settings Tab */}
      {activeTab === "settings" && (
        <div style={{ padding: "24px 20px", maxWidth: "600px" }}>
          <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: "1.2rem", color: "#1C1C1A", marginBottom: "20px" }}>Site Settings</div>
          {[
            { label: "Open House Dates & Times", key: "openHouse", placeholder: "e.g. May 16–17, 10am–4pm" },
            { label: "Pickup Deadline", key: "pickupDeadline", placeholder: "e.g. May 28, 2025" },
            { label: "Address / Location", key: "address", placeholder: "e.g. The Indie, Unit 1107" },
            { label: "Hero Image URL (shown below header)", key: "heroImage", placeholder: "Paste any image URL — Dropbox links auto-converted" },
            { label: "Footer Note", key: "footerNote", placeholder: "Payment and pickup info shown in footer", wide: true },
          ].map(f => (
            <div key={f.key} style={{ marginBottom: "16px" }}>
              <div style={S.adminLabel}>{f.label}</div>
              {f.wide
                ? <textarea style={{ ...S.adminInput, height: "72px", resize: "vertical" }} value={localSettings[f.key]} onChange={e => setLocalSettings(p => ({ ...p, [f.key]: e.target.value }))} placeholder={f.placeholder} />
                : <input style={S.adminInput} value={localSettings[f.key]} onChange={e => setLocalSettings(p => ({ ...p, [f.key]: f.key === "heroImage" ? normalizePhotoUrl(e.target.value) : e.target.value }))} placeholder={f.placeholder} />
              }
            </div>
          ))}
          <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: "1rem", color: "#1C1C1A", margin: "24px 0 16px" }}>Payment Links</div>
          {[
            { label: "Venmo Handle (display)", key: "venmoHandle", placeholder: "@Sarah-Sadd" },
            { label: "Venmo URL", key: "venmo", placeholder: "https://venmo.com/u/…" },
            { label: "PayPal Handle (display)", key: "paypalHandle", placeholder: "@sarahsadd" },
            { label: "PayPal URL", key: "paypal", placeholder: "https://paypal.me/…" },
            { label: "Cash App Handle (display)", key: "cashappHandle", placeholder: "$supersadd" },
            { label: "Cash App URL", key: "cashapp", placeholder: "https://cash.app/$…" },
          ].map(f => (
            <div key={f.key} style={{ marginBottom: "14px" }}>
              <div style={S.adminLabel}>{f.label}</div>
              <input style={S.adminInput} value={localSettings[f.key]} onChange={e => setLocalSettings(p => ({ ...p, [f.key]: e.target.value }))} placeholder={f.placeholder} />
            </div>
          ))}
          <div style={{ marginTop: "24px" }}>
            <button onClick={handleSave} style={{ ...S.adminSaveBtn, padding: "10px 32px", fontSize: "0.85rem", background: saveError ? "#8B2020" : saved ? "#1A5C2A" : "#1C1C1A" }}>
              {saving ? "Saving…" : saveError ? "Save Failed — Try Again" : saved ? "Saved ✓" : "Save Settings"}
            </button>
          </div>
        </div>
      )}

      {/* Items Tab */}
      {activeTab === "items" && <div>
        <div style={{ background: "#F2EFE9", borderBottom: "1px solid #E0DBD3", padding: "10px 16px", display: "flex", gap: "8px", overflowX: "auto" }}>
          <input placeholder="Search…" value={search} onChange={e => setSearch(e.target.value)} style={{ ...S.adminInput, width: "180px", flexShrink: 0 }} />
          <select value={roomFilter} onChange={e => setRoomFilter(e.target.value)} style={{ ...S.adminSelect, width: "auto" }}>
            <option value="all">All Rooms</option>
            {ROOMS.map(r => <option key={r} value={r}>{r}</option>)}
          </select>
          <button onClick={() => setShowAddForm(v => !v)} style={S.adminAddBtn}>+ Add Item</button>
        </div>

        {showAddForm && (
          <div style={{ background: "#FEF3EE", borderBottom: "1px solid #E0DBD3", padding: "16px 20px" }}>
            <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: "1.1rem", color: "#C4522A", marginBottom: "12px" }}>New Item</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(180px,1fr))", gap: "10px" }}>
              <div><div style={S.adminLabel}>Name</div><input style={S.adminInput} value={newItem.name} onChange={e => setNewItem(p => ({ ...p, name: e.target.value }))} placeholder="Item name" /></div>
              <div>
                <div style={S.adminLabel}>Room / Category</div>
                <input style={S.adminInput} list="room-options" value={newItem.room} onChange={e => setNewItem(p => ({ ...p, room: e.target.value }))} placeholder="Select or type a new category" />
                <datalist id="room-options">{[...new Set(localItems.map(i => i.room))].map(r => <option key={r} value={r} />)}</datalist>
              </div>
              <div><div style={S.adminLabel}>Retail $</div><input style={S.adminInput} type="number" value={newItem.retail} onChange={e => setNewItem(p => ({ ...p, retail: e.target.value }))} /></div>
              <div><div style={S.adminLabel}>Sale $</div><input style={S.adminInput} type="number" value={newItem.sale} onChange={e => setNewItem(p => ({ ...p, sale: e.target.value }))} /></div>
              <div><div style={S.adminLabel}>Photo URL</div><input style={S.adminInput} value={newItem.photo} onChange={e => setNewItem(p => ({ ...p, photo: normalizePhotoUrl(e.target.value) }))} placeholder="https://…" /></div>
              <div><div style={S.adminLabel}>Product Link</div><input style={S.adminInput} value={newItem.link} onChange={e => setNewItem(p => ({ ...p, link: e.target.value }))} placeholder="https://…" /></div>
            </div>
            <div style={{ marginTop: "12px", display: "flex", gap: "8px", alignItems: "center" }}>
              <label style={{ fontSize: "0.78rem", color: "#6B6B65", display: "flex", gap: "6px", alignItems: "center" }}><input type="checkbox" checked={newItem.large} onChange={e => setNewItem(p => ({ ...p, large: e.target.checked }))} /> Large item (requires pickup)</label>
              <button onClick={addItem} style={S.adminAddBtn}>Add Item</button>
              <button onClick={() => setShowAddForm(false)} style={S.adminDeleteBtn}>Cancel</button>
            </div>
          </div>
        )}

        <div style={S.adminGrid} id="items-drag-container">
          {visibleItems.map((item, idx) => (
            <div key={item.id} style={{ ...S.adminCard, cursor: "grab", borderTop: "2px solid transparent" }}
              draggable
              onDragStart={e => { e.dataTransfer.setData("itemId", String(item.id)); e.currentTarget.style.opacity = "0.5"; }}
              onDragEnd={e => { e.currentTarget.style.opacity = "1"; }}
              onDragOver={e => { e.preventDefault(); e.currentTarget.style.borderTop = "2px solid #C4522A"; }}
              onDragLeave={e => { e.currentTarget.style.borderTop = "2px solid transparent"; }}
              onDrop={e => {
                e.preventDefault();
                e.currentTarget.style.borderTop = "2px solid transparent";
                const fromId = Number(e.dataTransfer.getData("itemId"));
                const toId = item.id;
                if (fromId === toId) return;
                setLocalItems(prev => {
                  const arr = [...prev];
                  const fromIdx = arr.findIndex(i => i.id === fromId);
                  const toIdx = arr.findIndex(i => i.id === toId);
                  const [moved] = arr.splice(fromIdx, 1);
                  arr.splice(toIdx, 0, moved);
                  return arr;
                });
                setSaved(false);
              }}
            >
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start", gap: "8px" }}>
                <div style={{ fontSize: "0.72rem", color: "#B0A898", letterSpacing: "0.05em", marginTop: "2px", flexShrink: 0 }}>⠿</div>
                <div style={{ flex: 1 }}>
                  <div style={S.adminLabel}>Name</div>
                  <input style={{ ...S.adminInput, fontWeight: 500 }} value={item.name} onChange={e => updateItem(item.id, "name", e.target.value)} />
                </div>
                <button onClick={() => deleteItem(item.id)} style={{ ...S.adminDeleteBtn, flexShrink: 0, marginTop: "18px" }}>✕</button>
              </div>
              <div>
                <div style={S.adminLabel}>Room / Category</div>
                <input style={S.adminInput} list="room-options" value={item.room} onChange={e => updateItem(item.id, "room", e.target.value)} placeholder="Select or type new" />
              </div>
              <div><div style={S.adminLabel}>Status</div>
                <select style={S.adminSelect} value={item.status} onChange={e => updateItem(item.id, "status", e.target.value)}>
                  <option value="available">Available</option>
                  <option value="deposit">Deposit Taken</option>
                  <option value="sold">Sold</option>
                </select>
              </div>
              <div style={S.adminRow}>
                <div><div style={S.adminLabel}>Sale Price $</div><input style={S.adminInput} type="number" value={item.sale} onChange={e => updateItem(item.id, "sale", Number(e.target.value))} /></div>
                <div><div style={S.adminLabel}>Deposit $</div><input style={S.adminInput} type="number" value={item.deposit} onChange={e => updateItem(item.id, "deposit", Number(e.target.value))} /></div>
              </div>
              <div><div style={S.adminLabel}>Photo URL</div><input style={S.adminInput} value={item.photo} onChange={e => updateItem(item.id, "photo", normalizePhotoUrl(e.target.value))} placeholder="https://…" /></div>
              <div><div style={S.adminLabel}>Product Link</div><input style={S.adminInput} value={item.link} onChange={e => updateItem(item.id, "link", e.target.value)} placeholder="https://…" /></div>
              <label style={{ fontSize: "0.75rem", color: "#6B6B65", display: "flex", gap: "6px", alignItems: "center" }}><input type="checkbox" checked={item.large} onChange={e => updateItem(item.id, "large", e.target.checked)} /> Large item (requires deposit + pickup)</label>
            </div>
          ))}
        </div>

        <div style={{ padding: "20px", textAlign: "center" }}>
          <button onClick={handleSave} style={{ ...S.adminSaveBtn, padding: "10px 32px", fontSize: "0.85rem", background: saveError ? "#8B2020" : saved ? "#1A5C2A" : "#1C1C1A" }}>
            {saving ? "Saving…" : saveError ? "Save Failed — Try Again" : saved ? "All Changes Saved ✓" : "Save All Changes"}
          </button>
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
