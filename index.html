const fmt = n => {
  const num = Number(n);
  return isNaN(num) ? "$0" : "$" + num.toLocaleString();
};

const pct = (sale, retail) => {
  const s = Number(sale), r = Number(retail);
  if (!r || r <= 0) return 0;
  return Math.max(0, Math.round(((r - s) / r) * 100));
};

// Single canonical Dropbox normalizer — handles both www and non-www
function normalizeUrl(url) {
  if (!url || typeof url !== "string") return "";
  url = url.trim();
  if (url.includes("dropbox.com")) {
    return url
      .replace(/^https?:\/\/(www\.)?dropbox\.com/, "https://dl.dropboxusercontent.com")
      .replace(/[?&]dl=\d/g, "")
      .replace(/[?&]raw=\d/g, "");
  }
  return url;
}

// Safe unique ID — stays within JS safe integer range and Supabase bigint
function newId() {
  // Use last 10 digits of timestamp + 4 random digits = 14 digit number
  // Max: 9,999,999,9999 * 9999 ~ safe, well within bigint range
  const ts = Date.now() % 10000000000; // last 10 digits
  const rand = typeof crypto !== "undefined" && crypto.getRandomValues
    ? crypto.getRandomValues(new Uint16Array(1))[0] // 0-65535
    : Math.floor(Math.random() * 65535);
  return ts * 100000 + (rand % 100000);
}

// Fetch with timeout
async function fetchWithTimeout(url, options = {}, ms = 15000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), ms);
  try {
    const res = await fetch(url, { ...options, signal: controller.signal });
    return res;
  } finally {
    clearTimeout(timer);
  }
}

    if (!Array.isArray(data)) throw new Error("getItems: unexpected response shape");
    // Sanitize every item — defend against bad DB data crashing ItemCard
    return data.map(item => ({
      id: item.id || newId(),
      room: item.room || "Miscellaneous",
      name: item.name || "Unnamed Item",
      retail: Number(item.retail) || 0,

      status: VALID_STATUSES.includes(item.status) ? item.status : "available",
      photo: normalizeUrl(item.photo || ""),
      link: item.link || "",
    }));
  },

  async saveItems(items) {
    // Step 1: Delete all
    const del = await fetchWithTimeout(
      `${SUPABASE_URL}/rest/v1/sale_items`,
      { method: "DELETE", headers: { ...sbH, "Prefer": "return=minimal" } }
    );
    if (!del.ok) throw new Error(`saveItems delete failed: ${del.status} — ${await del.text()}`);
    if (items.length === 0) return;
    // Step 2: Insert in batches of 10
    for (let i = 0; i < items.length; i += 10) {
      const batch = items.slice(i, i + 10);
      const r = await fetchWithTimeout(
        `${SUPABASE_URL}/rest/v1/sale_items`,
        { method: "POST", headers: { ...sbH, "Prefer": "return=minimal" }, body: JSON.stringify(batch) }
      );
      if (!r.ok) throw new Error(`saveItems batch ${i} failed: ${r.status} — ${await r.text()}`);
    }
    // Step 3: Verify count — non-fatal if header missing
    try {
      const v = await fetchWithTimeout(
        `${SUPABASE_URL}/rest/v1/sale_items?select=id`,
        { headers: { ...sbH, "Prefer": "count=exact", "Range-Unit": "items", "Range": "0-999" } }
      );
      const cr = v.headers.get("content-range");
      if (cr) {
        const count = parseInt(cr.split("/")[1]);
        if (!isNaN(count) && count !== items.length) {
          throw new Error(`saveItems verify failed: expected ${items.length}, got ${count}`);

      if (e.message.includes("verify failed")) throw e;

    }

    return data.map(p => ({
      id: p.id || newId(),
      url: normalizeUrl(p.url || ""),
      caption: p.caption || "",
      sort_order: p.sort_order || 0,
    }));
  },

  async savePhotos(photos) {
    const del = await fetchWithTimeout(
      `${SUPABASE_URL}/rest/v1/apt_photos`,
      { method: "DELETE", headers: { ...sbH, "Prefer": "return=minimal" } }
    );
    if (!del.ok) throw new Error(`savePhotos delete failed: ${del.status} — ${await del.text()}`);
    if (photos.length === 0) return;
    const withOrder = photos.map((p, i) => ({ ...p, sort_order: i }));
    for (let i = 0; i < withOrder.length; i += 10) {
      const batch = withOrder.slice(i, i + 10);
      const r = await fetchWithTimeout(
        `${SUPABASE_URL}/rest/v1/apt_photos`,
        { method: "POST", headers: { ...sbH, "Prefer": "return=minimal" }, body: JSON.stringify(batch) }
      );
      if (!r.ok) throw new Error(`savePhotos batch ${i} failed: ${r.status} — ${await r.text()}`);
    }
    // Verify — non-fatal on header issues
    try {
      const v = await fetchWithTimeout(
        `${SUPABASE_URL}/rest/v1/apt_photos?select=id`,
        { headers: { ...sbH, "Prefer": "count=exact", "Range-Unit": "items", "Range": "0-999" } }
      );
      const cr = v.headers.get("content-range");
      if (cr) {
        const count = parseInt(cr.split("/")[1]);
        if (!isNaN(count) && count !== photos.length) {
          throw new Error(`savePhotos verify failed: expected ${photos.length}, got ${count}`);
        }
      }
    } catch(e) {
      if (e.message.includes("verify failed")) throw e;
    }
  },

  async getSettings() {
    const r = await fetchWithTimeout(
      `${SUPABASE_URL}/rest/v1/site_settings?select=*&limit=1`,
      { headers: sbH }
    );
    if (!r.ok) throw new Error(`getSettings failed: ${r.status}`);
    const data = await r.json();
    if (!Array.isArray(data) || data.length === 0) return null;
    // Safely merge — defend against malformed JSON in DB
    try {
      const val = typeof data[0].value === "object" ? data[0].value : JSON.parse(data[0].value);
      return { ...DEFAULT_SETTINGS, ...val };
    } catch {
      return DEFAULT_SETTINGS;
    }
  },

  async saveSettings(settings) {
    const del = await fetchWithTimeout(
      `${SUPABASE_URL}/rest/v1/site_settings`,
      { method: "DELETE", headers: { ...sbH, "Prefer": "return=minimal" } }
    );
    if (!del.ok) throw new Error(`saveSettings delete failed: ${del.status}`);
    const r = await fetchWithTimeout(
      `${SUPABASE_URL}/rest/v1/site_settings`,
      { method: "POST", headers: { ...sbH, "Prefer": "return=minimal" }, body: JSON.stringify([{ id: 1, value: settings }]) }
    );
    if (!r.ok) throw new Error(`saveSettings insert failed: ${r.status} — ${await r.text()}`);
  },
};

// ─── ERROR BOUNDARY ───────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  componentDidCatch(e, info) { console.error("ErrorBoundary caught:", e, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{ fontFamily: "'DM Sans',sans-serif", padding: "48px 24px", textAlign: "center", background: "#FAFAF8", minHeight: "100vh" }}>
          <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: "1.5rem", color: "#1C1C1A", marginBottom: "12px" }}>Something went wrong</div>
          <div style={{ fontSize: "0.82rem", color: "#8A8A82", marginBottom: "24px", maxWidth: "360px", margin: "0 auto 24px" }}>
            An error occurred loading the page. Please refresh and try again.
          </div>
          <div style={{ fontSize: "0.72rem", color: "#C4522A", fontFamily: "monospace", marginBottom: "24px" }}>
            {this.state.error.message}
          </div>
          <button onClick={() => window.location.reload()} style={{ background: "#1C1C1A", color: "#FAFAF8", border: "none", borderRadius: "4px", padding: "10px 28px", fontFamily: "inherit", cursor: "pointer", fontSize: "0.85rem" }}>
            Refresh Page
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState("public");
  const [items, setItems] = useState([]);
  const [photos, setPhotos] = useState([]);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [loadState, setLoadState] = useState("loading"); // loading | ok | error | retrying

  async function load() {
    setLoadState("loading");
    const alive = await db.ping();
    if (!alive) { setLoadState("error"); return; }
    try {
      const [dbItems, dbPhotos, dbSettings] = await Promise.all([
        db.getItems().catch(() => null),
        db.getPhotos().catch(() => []),
        db.getSettings().catch(() => null),
      ]);
      // getItems returning null means DB is accessible but table is empty — use INITIAL_ITEMS
      // getItems throwing means real error — already caught above
      setItems(dbItems !== null ? dbItems : INITIAL_ITEMS);
      setPhotos(dbPhotos || []);
      setSettings(dbSettings || DEFAULT_SETTINGS);
      setLoadState("ok");
    } catch(e) {
      console.error("Load error:", e);
      setLoadState("error");
    }
  }

  useEffect(() => { load(); }, []);

  if (loadState === "loading" || loadState === "retrying") {
    return (
      <div style={{ background: "#FAFAF8", minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: "12px", fontFamily: "'DM Sans',sans-serif" }}>
        <div style={{ width: "32px", height: "32px", border: "2px solid #E0DBD3", borderTop: "2px solid #C4522A", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
        <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        <div style={{ fontSize: "0.8rem", letterSpacing: "0.12em", textTransform: "uppercase", color: "#8A8A82" }}>
          {loadState === "retrying" ? "Reconnecting…" : "Loading…"}
        </div>
      </div>
    );
  }

  if (loadState === "error") {
    return (
      <div style={{ background: "#FAFAF8", minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: "12px", fontFamily: "'DM Sans',sans-serif", padding: "40px", textAlign: "center" }}>
        <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: "1.3rem", color: "#1C1C1A" }}>Database unavailable</div>
        <div style={{ fontSize: "0.8rem", color: "#8A8A82", maxWidth: "320px", lineHeight: 1.7 }}>
          Supabase may be waking up. This can take up to 30 seconds on first load. Wait a moment then try again.
        </div>
        <button onClick={() => { setLoadState("retrying"); setTimeout(load, 2000); }}
          style={{ marginTop: "8px", background: "#1C1C1A", color: "#FAFAF8", border: "none", borderRadius: "4px", padding: "10px 28px", fontFamily: "inherit", cursor: "pointer", fontSize: "0.85rem" }}>
          Try Again
        </button>
      </div>
    );
  }

  if (view === "login") return <AdminLogin onSuccess={() => setView("admin")} onBack={() => setView("public")} />;
  if (view === "admin") return (
    <AdminPanel
      items={items} setItems={setItems}
      photos={photos} setPhotos={setPhotos}
      settings={settings} setSettings={setSettings}
      onBack={() => setView("public")}
    />
  );
  if (view === "gallery") return <GalleryPage photos={photos} onBack={() => setView("public")} />;
  return <PublicSite items={items} photos={photos} settings={settings} onAdminClick={() => setView("login")} onGalleryClick={() => setView("gallery")} />;
}

  useEffect(() => {
    function onKey(e) {
      const n = photosRef.current.length;
      if (!n) return;
      if (e.key === "Escape") setLightbox(null);
      if (e.key === "ArrowRight") setLightbox(i => i === null ? null : (i + 1) % n);
      if (e.key === "ArrowLeft") setLightbox(i => i === null ? null : (i - 1 + n) % n);

// ─── PUBLIC SITE ──────────────────────────────────────────────────────────────
function PublicSite({ items, photos, settings, onAdminClick, onGalleryClick }) {
  const [roomFilter, setRoomFilter] = useState("all");
  const [search, setSearch] = useState("");

  const allRooms = useMemo(() => [...new Set(items.map(i => i.room))], [items]);

  const filtered = useMemo(() => items.filter(item => {
    const matchRoom = roomFilter === "all" || item.room === roomFilter;
    const matchSearch = !search || item.name.toLowerCase().includes(search.toLowerCase()) || item.room.toLowerCase().includes(search.toLowerCase());
    return matchRoom && matchSearch;
  }), [items, roomFilter, search]);

  const filteredRooms = useMemo(() => [...new Set(filtered.map(i => i.room))], [filtered]);
  const available = useMemo(() => items.filter(i => i.status === "available").length, [items]);
  const sold = useMemo(() => items.filter(i => i.status === "sold").length, [items]);

  return (
    <ErrorBoundary>
      <div style={S.page}>
        <header style={{ ...S.hero, paddingBottom: settings.heroImage ? "28px" : "44px" }}>
          <p style={S.heroSub}>Estate Sale · Atlanta, Georgia</p>
          <h1 style={S.heroTitle}>Everything <em style={S.heroItalic}>Must Go</em></h1>
          <div style={S.pills}>
            <span style={S.pill}>Open House: {settings.openHouse}</span>
            <span style={S.pill}>{settings.address}</span>

              <button onClick={onGalleryClick}
                style={{ ...S.pill, background: "rgba(196,82,42,0.25)", border: "1px solid rgba(196,82,42,0.5)", color: "#F0C4A8", cursor: "pointer", fontFamily: "inherit" }}>
                View the Space →
              </button>
            )}
          </div>
          <div style={S.notice}>
            <strong style={S.noticeStrong}>How it works:</strong> Small items leave same day with payment. Large furniture requires a <strong style={S.noticeStrong}>non-refundable 40% deposit</strong> to hold — pickup by <strong style={S.noticeStrong}>{settings.pickupDeadline}</strong> or deposit is forfeited.
          </div>
        </header>

        {settings.heroImage && <HeroImage src={settings.heroImage} />}

        <div style={S.searchWrap}>
          <input style={S.searchInput} placeholder="Search items…" value={search} onChange={e => setSearch(e.target.value)} />
        </div>

        <div style={S.filterBar}>
          <div style={S.filterRow}>
            <span style={S.filterLabel}>Room:</span>
            <button style={S.filterBtn(roomFilter === "all")} onClick={() => setRoomFilter("all")}>All</button>
            {allRooms.map(r => (
              <button key={r} style={S.filterBtn(roomFilter === r)} onClick={() => setRoomFilter(r)}>{r}</button>
            ))}
          </div>
        </div>

        <div style={S.statsBar}>
          <span style={{ fontWeight: 600 }}>{available}</span> available · <span style={{ color: "#FFD4C0" }}>{sold}</span> sold · {items.length} total items
        </div>

        <div>
          {filteredRooms.map(room => {
            const roomItems = filtered.filter(i => i.room === room);
            if (!roomItems.length) return null;
            return (
              <div key={room}>
                <div style={S.roomHeader}>
                  <h2 style={S.roomTitle}>{room}</h2>
                  <span style={S.roomCount}>{roomItems.length} item{roomItems.length !== 1 ? "s" : ""}</span>
                </div>
                <div style={S.grid}>
                  {roomItems.map(item => (
                    <ErrorBoundary key={item.id}>
                      <ItemCard item={item} settings={settings} />
                    </ErrorBoundary>
                  ))}
                </div>
              </div>
            );
          })}
          {filteredRooms.length === 0 && (
            <p style={{ padding: "40px", textAlign: "center", color: "#9A9A90" }}>No items found.</p>
          )}
        </div>

        <footer style={S.footer}>
          <h3 style={S.footerTitle}>Questions & Payment</h3>
          <p style={S.footerText}>{settings.footerNote}</p>
          <div style={S.payRow}>
            <a href={settings.venmo} target="_blank" rel="noopener" style={{ ...S.payPill, textDecoration: "none" }}>Venmo {settings.venmoHandle}</a>
            <a href={settings.paypal} target="_blank" rel="noopener" style={{ ...S.payPill, textDecoration: "none" }}>PayPal {settings.paypalHandle}</a>
            <a href={settings.cashapp} target="_blank" rel="noopener" style={{ ...S.payPill, textDecoration: "none" }}>Cash App {settings.cashappHandle}</a>
            <span style={S.payPill}>Zelle — scan QR at door</span>

          <button onClick={onAdminClick}

            Admin
          </button>
        </div>
      </div>
    </ErrorBoundary>
  );
}

// ─── ITEM CARD ────────────────────────────────────────────────────────────────

  const statusCfg = getStatus(item.status);

    <div style={S.card(item.status)}>

        <span style={S.badge(statusCfg)}>{statusCfg.label}</span>

// ─── ADMIN PANEL ──────────────────────────────────────────────────────────────
function AdminPanel({ items, setItems, photos, setPhotos, settings, setSettings, onBack }) {
  // Local copies — changes here don't affect the public view until saved
  const [localItems, setLocalItems] = useState(() => items.map(i => ({ ...i })));
  const [localPhotos, setLocalPhotos] = useState(() => photos.map(p => ({ ...p })));
  const [localSettings, setLocalSettings] = useState(() => ({ ...settings }));
  const [saveState, setSaveState] = useState("idle"); // idle | saving | saved | error
  const [saveMsg, setSaveMsg] = useState("");
  const [isDirty, setIsDirty] = useState(false);
  const saveLock = useRef(false);
  const [activeTab, setActiveTab] = useState("items");
  const [roomFilter, setRoomFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [showAddForm, setShowAddForm] = useState(false);
  const [newItem, setNewItem] = useState({ room: "", name: "", retail: "", sale: "", deposit: 0, large: false, status: "available", photo: "", link: "" });
  const [newPhotoUrl, setNewPhotoUrl] = useState("");
  const [newPhotoCaption, setNewPhotoCaption] = useState("");

  // Warn before closing with unsaved changes
  // Note: beforeunload is unreliable on mobile Safari but works on desktop/Chrome
  useEffect(() => {
    function handleBeforeUnload(e) {
      if (!isDirty) return;
      e.preventDefault();
      e.returnValue = "You have unsaved changes. Are you sure you want to leave?";
      return e.returnValue;
    }
    window.addEventListener("beforeunload", handleBeforeUnload);
    return () => window.removeEventListener("beforeunload", handleBeforeUnload);
  }, [isDirty]);

  function markDirty() { setIsDirty(true); setSaveState("idle"); }

  // Dynamic room list from actual items (not hardcoded)
  const allRooms = useMemo(() => [...new Set(localItems.map(i => i.room))].filter(Boolean), [localItems]);

  const visibleItems = useMemo(() => localItems.filter(item => {
    const matchRoom = roomFilter === "all" || item.room === roomFilter;
    const matchSearch = !search || item.name.toLowerCase().includes(search.toLowerCase());
    return matchRoom && matchSearch;
  }), [localItems, roomFilter, search]);

  function updateItem(id, field, value) {
    setLocalItems(prev => prev.map(i => i.id === id ? { ...i, [field]: value } : i));
    markDirty();
  }

  function deleteItem(id) {
    if (!confirm("Delete this item? This cannot be undone until you save.")) return;
    setLocalItems(prev => prev.filter(i => i.id !== id));
    markDirty();
  }

  function addItem() {
    if (!newItem.name.trim()) return;
    const id = newId();
    const item = {
      ...newItem,
      id,
      room: newItem.room || allRooms[0] || "Miscellaneous",
      retail: Number(newItem.retail) || 0,
      sale: Number(newItem.sale) || 0,
      deposit: Number(newItem.deposit) || 0,
      photo: normalizeUrl(newItem.photo),
    };
    setLocalItems(prev => [...prev, item]);
    setNewItem({ room: "", name: "", retail: "", sale: "", deposit: 0, large: false, status: "available", photo: "", link: "" });
    setShowAddForm(false);
    markDirty();
  }

  function addPhoto() {
    if (!newPhotoUrl.trim()) return;
    setLocalPhotos(prev => [...prev, { id: newId(), url: normalizeUrl(newPhotoUrl.trim()), caption: newPhotoCaption.trim() }]);
    setNewPhotoUrl(""); setNewPhotoCaption("");
    markDirty();
  }

  function deletePhoto(id) {
    setLocalPhotos(prev => prev.filter(p => p.id !== id));
    markDirty();
  }

  function movePhoto(id, dir) {
    setLocalPhotos(prev => {
      const arr = [...prev];
      const idx = arr.findIndex(p => p.id === id);
      const next = idx + dir;
      if (next < 0 || next >= arr.length) return prev;
      [arr[idx], arr[next]] = [arr[next], arr[idx]];
      return arr;
    });
    markDirty();
  }

  function updatePhotoCaption(id, caption) {
    setLocalPhotos(prev => prev.map(p => p.id === id ? { ...p, caption } : p));
    markDirty();
  }

  // Save items + photos only (settings are saved separately via handleSaveSettings)
  async function handleSave() {
    if (saveLock.current) return;
    saveLock.current = true;
    setSaveState("saving"); setSaveMsg("");
    try {
      await db.saveItems(localItems);
      await db.savePhotos(localPhotos);
      setItems(localItems);
      setPhotos(localPhotos);
      setIsDirty(false);
      setSaveState("saved"); setSaveMsg("All changes saved ✓");
      setTimeout(() => { setSaveState("idle"); setSaveMsg(""); }, 5000);
    } catch(e) {
      console.error("Save failed:", e);
      setSaveState("error"); setSaveMsg(e.message || "Save failed");
      alert(`Save failed: ${e.message}\n\nDo NOT close this window. Your unsaved changes are still here. Try saving again.`);
    }
    saveLock.current = false;
  }

  // Save settings only (used from Settings tab)
  async function handleSaveSettings() {
    if (saveLock.current) return;
    saveLock.current = true;
    setSaveState("saving"); setSaveMsg("");
    try {
      await db.saveSettings(localSettings);
      setSettings(localSettings);
      setIsDirty(false);
      setSaveState("saved"); setSaveMsg("Settings saved ✓");
      setTimeout(() => { setSaveState("idle"); setSaveMsg(""); }, 5000);
    } catch(e) {
      console.error("Settings save failed:", e);
      setSaveState("error"); setSaveMsg(e.message || "Save failed");
      alert(`Settings save failed: ${e.message}\n\nDo NOT close this window. Try saving again.`);
    }
    saveLock.current = false;
  }

  function handleBack() {
    if (isDirty) {
      if (!confirm("You have unsaved changes. Go back anyway? Your changes will be lost.")) return;
    }
    onBack();
  }

  const stats = {
    available: localItems.filter(i => i.status === "available").length,
    deposit: localItems.filter(i => i.status === "deposit").length,
    sold: localItems.filter(i => i.status === "sold").length,
    revenue: localItems.filter(i => i.status !== "available").reduce((s, i) => s + (Number(i.sale) || 0), 0),
  };

  const saveBtnLabel = saveState === "saving" ? "Saving…"
    : saveState === "saved" ? "Saved ✓"
    : saveState === "error" ? "Save Failed — Retry"
    : isDirty ? (activeTab === "settings" ? "Save Settings" : "Save All") : "No Changes";

  return (
    <div style={S.adminWrap}>
      {/* Header */}
      <div style={S.adminHeader}>
        <h1 style={S.adminTitle}>Sale Admin</h1>
        {isDirty && <span style={{ fontSize: "0.68rem", color: "#F0C4A8", letterSpacing: "0.08em" }}>● Unsaved changes</span>}
        <div style={{ display: "flex", gap: "8px" }}>
          <button
            onClick={activeTab === "settings" ? handleSaveSettings : handleSave}
            disabled={saveState === "saving" || (!isDirty && saveState !== "error")}
            style={{ ...S.adminSaveBtn(saveState), opacity: (!isDirty && saveState === "idle") ? 0.5 : 1 }}>
            {saveBtnLabel}
          </button>
          <button onClick={handleBack} style={S.adminSaveBtn("idle")}>← Back</button>
        </div>
      </div>

      {/* Save message banner */}
      {saveMsg && (
        <div style={{ background: saveState === "error" ? "#FEF0F0" : "#EAF2EC", borderBottom: `1px solid ${saveState === "error" ? "#F0C4C4" : "#B0D4BA"}`, padding: "10px 20px", fontSize: "0.78rem", color: saveState === "error" ? "#8B2020" : "#1A5C2A", letterSpacing: "0.04em" }}>
          {saveMsg}
        </div>
      )}

      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: "1px", background: "#E0DBD3" }}>
        {[
          { label: "Available", val: stats.available, color: "#1A5C2A" },
          { label: "Deposit Taken", val: stats.deposit, color: "#C4522A" },
          { label: "Sold", val: stats.sold, color: "#4A4A44" },
          { label: "Revenue", val: fmt(stats.revenue), color: "#C4522A" },
        ].map(s => (
          <div key={s.label} style={{ background: "#FAFAF8", padding: "14px 16px", textAlign: "center" }}>
            <div style={{ fontSize: "0.65rem", letterSpacing: "0.1em", textTransform: "uppercase", color: "#8A8A82", marginBottom: "4px" }}>{s.label}</div>
            <div style={{ fontSize: "1.4rem", fontWeight: 500, color: s.color }}>{s.val}</div>
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div style={{ background: "#F2EFE9", borderBottom: "1px solid #E0DBD3", display: "flex" }}>
        {["items", "photos", "settings"].map(tab => (
          <button key={tab} onClick={() => setActiveTab(tab)}
            style={{ background: "transparent", border: "none", borderBottom: `2px solid ${activeTab === tab ? "#C4522A" : "transparent"}`, padding: "12px 20px", fontFamily: "inherit", fontSize: "0.78rem", letterSpacing: "0.1em", textTransform: "uppercase", color: activeTab === tab ? "#C4522A" : "#6B6B65", cursor: "pointer", fontWeight: activeTab === tab ? 500 : 400 }}>
            {tab === "items" ? `Items (${localItems.length})` : tab === "photos" ? `Photos (${localPhotos.length})` : "Settings"}
          </button>
        ))}
      </div>

      {/* ── PHOTOS TAB ── */}
      {activeTab === "photos" && (
        <div>
          <div style={{ background: "#FEF3EE", borderBottom: "1px solid #E0DBD3", padding: "16px 20px" }}>
            <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: "1.1rem", color: "#C4522A", marginBottom: "12px" }}>Add Apartment Photo</div>
            <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr auto", gap: "10px", alignItems: "end" }}>
              <div>
                <div style={S.adminLabel}>Image URL — Dropbox links auto-converted</div>
                <input style={S.adminInput} value={newPhotoUrl} onChange={e => setNewPhotoUrl(e.target.value)}
                  placeholder="Paste any image URL" onKeyDown={e => e.key === "Enter" && addPhoto()} />
              </div>
              <div>
                <div style={S.adminLabel}>Caption (optional)</div>
                <input style={S.adminInput} value={newPhotoCaption} onChange={e => setNewPhotoCaption(e.target.value)}
                  placeholder="e.g. Living room" onKeyDown={e => e.key === "Enter" && addPhoto()} />
              </div>
              <button onClick={addPhoto} style={S.adminAddBtn}>Add</button>
            </div>
          </div>
          {localPhotos.length === 0
            ? <div style={{ padding: "48px", textAlign: "center", color: "#8A8A82" }}>No photos yet.</div>
            : <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(260px,1fr))", gap: "1px", background: "#E0DBD3" }}>
                {localPhotos.map((photo, idx) => (
                  <div key={photo.id} style={S.adminCard}>
                    <div style={{ width: "100%", height: "140px", background: "#F2EFE9", borderRadius: "3px", overflow: "hidden" }}>
                      <img src={photo.url} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }}
                        onError={e => { e.currentTarget.style.opacity = "0.15"; }} />
                    </div>
                    <div>
                      <div style={S.adminLabel}>Caption</div>
                      <input style={S.adminInput} value={photo.caption} onChange={e => updatePhotoCaption(photo.id, e.target.value)} placeholder="e.g. Living room" />
                    </div>
                    <div style={{ display: "flex", gap: "6px", alignItems: "center" }}>
                      <span style={{ fontSize: "0.67rem", color: "#8A8A82", flex: 1 }}>Photo {idx + 1} of {localPhotos.length}</span>
                      <button onClick={() => movePhoto(photo.id, -1)} disabled={idx === 0} style={{ ...S.adminDeleteBtn, opacity: idx === 0 ? 0.3 : 1 }}>↑</button>
                      <button onClick={() => movePhoto(photo.id, 1)} disabled={idx === localPhotos.length - 1} style={{ ...S.adminDeleteBtn, opacity: idx === localPhotos.length - 1 ? 0.3 : 1 }}>↓</button>
                      <button onClick={() => deletePhoto(photo.id)} style={{ ...S.adminDeleteBtn, color: "#C4522A", borderColor: "#F0C4A8" }}>✕</button>
                    </div>
                  </div>
                ))}
              </div>
          }
          <div style={{ padding: "20px", textAlign: "center" }}>
            <button onClick={handleSave} disabled={saveState === "saving" || (!isDirty && saveState !== "error")}
              style={{ ...S.adminSaveBtn(saveState), padding: "10px 32px", fontSize: "0.85rem", opacity: (!isDirty && saveState === "idle") ? 0.5 : 1 }}>
              {saveBtnLabel}
            </button>
          </div>
        </div>
      )}

      {/* ── SETTINGS TAB ── */}
      {activeTab === "settings" && (
        <div style={{ padding: "24px 20px", maxWidth: "600px" }}>
          <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: "1.2rem", color: "#1C1C1A", marginBottom: "20px" }}>Site Settings</div>
          {[
            { label: "Open House Dates & Times", key: "openHouse", placeholder: "e.g. May 16–17, 10am–4pm" },
            { label: "Pickup Deadline", key: "pickupDeadline", placeholder: "e.g. May 28, 2025" },
            { label: "Address / Location", key: "address", placeholder: "e.g. The Indie, Unit 1107" },
            { label: "Hero Image URL (shown below header — Dropbox auto-converted)", key: "heroImage", placeholder: "Paste any image URL" },
            { label: "Footer Note", key: "footerNote", placeholder: "Payment info shown in footer", wide: true },
          ].map(f => (
            <div key={f.key} style={{ marginBottom: "16px" }}>
              <div style={S.adminLabel}>{f.label}</div>
              {f.wide
                ? <textarea style={{ ...S.adminInput, height: "72px", resize: "vertical" }}
                    value={localSettings[f.key] || ""} onChange={e => { setLocalSettings(p => ({ ...p, [f.key]: e.target.value })); markDirty(); }}
                    placeholder={f.placeholder} />
                : <input style={S.adminInput}
                    value={localSettings[f.key] || ""}
                    onChange={e => { setLocalSettings(p => ({ ...p, [f.key]: f.key === "heroImage" ? normalizeUrl(e.target.value) : e.target.value })); markDirty(); }}
                    placeholder={f.placeholder} />
              }
            </div>
          ))}
          <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: "1rem", color: "#1C1C1A", margin: "24px 0 16px" }}>Payment Links</div>
          {[
            { label: "Venmo Handle (display)", key: "venmoHandle" },
            { label: "Venmo URL", key: "venmo" },
            { label: "PayPal Handle (display)", key: "paypalHandle" },
            { label: "PayPal URL", key: "paypal" },
            { label: "Cash App Handle (display)", key: "cashappHandle" },
            { label: "Cash App URL", key: "cashapp" },
          ].map(f => (
            <div key={f.key} style={{ marginBottom: "14px" }}>
              <div style={S.adminLabel}>{f.label}</div>
              <input style={S.adminInput} value={localSettings[f.key] || ""}
                onChange={e => { setLocalSettings(p => ({ ...p, [f.key]: e.target.value })); markDirty(); }} />
            </div>
          ))}
          <div style={{ marginTop: "24px" }}>
            <button onClick={handleSaveSettings} disabled={saveState === "saving" || (!isDirty && saveState !== "error")}
              style={{ ...S.adminSaveBtn(saveState), padding: "10px 32px", fontSize: "0.85rem", opacity: (!isDirty && saveState === "idle") ? 0.5 : 1 }}>
              {saveBtnLabel}
            </button>
          </div>
        </div>
      )}

      {/* ── ITEMS TAB ── */}
      {activeTab === "items" && (
        <div>
          {/* Filter + search bar */}
          <div style={{ background: "#F2EFE9", borderBottom: "1px solid #E0DBD3", padding: "10px 16px", display: "flex", gap: "8px", overflowX: "auto" }}>
            <input placeholder="Search…" value={search} onChange={e => setSearch(e.target.value)}
              style={{ ...S.adminInput, width: "180px", flexShrink: 0 }} />
            <select value={roomFilter} onChange={e => setRoomFilter(e.target.value)} style={{ ...S.adminSelect, width: "auto" }}>
              <option value="all">All Rooms</option>
              {allRooms.map(r => <option key={r} value={r}>{r}</option>)}
            </select>
            <button onClick={() => setShowAddForm(v => !v)} style={S.adminAddBtn}>+ Add Item</button>
          </div>

          {/* Add item form */}
          {showAddForm && (
            <div style={{ background: "#FEF3EE", borderBottom: "1px solid #E0DBD3", padding: "16px 20px" }}>
              <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: "1.1rem", color: "#C4522A", marginBottom: "12px" }}>New Item</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(180px,1fr))", gap: "10px" }}>
                <div>
                  <div style={S.adminLabel}>Name</div>
                  <input style={S.adminInput} value={newItem.name} onChange={e => setNewItem(p => ({ ...p, name: e.target.value }))} placeholder="Item name" />
                </div>
                <div>
                  <div style={S.adminLabel}>Room / Category</div>
                  <input style={S.adminInput} list="room-options-new" value={newItem.room}
                    onChange={e => setNewItem(p => ({ ...p, room: e.target.value }))} placeholder="Select or type new" />
                  <datalist id="room-options-new">{allRooms.map(r => <option key={r} value={r} />)}</datalist>
                </div>
                <div><div style={S.adminLabel}>Retail $</div><input style={S.adminInput} type="number" value={newItem.retail} onChange={e => setNewItem(p => ({ ...p, retail: e.target.value }))} /></div>
                <div><div style={S.adminLabel}>Sale $</div><input style={S.adminInput} type="number" value={newItem.sale} onChange={e => setNewItem(p => ({ ...p, sale: e.target.value }))} /></div>
                <div><div style={S.adminLabel}>Photo URL</div><input style={S.adminInput} value={newItem.photo} onChange={e => setNewItem(p => ({ ...p, photo: normalizeUrl(e.target.value) }))} placeholder="https://…" /></div>
                <div><div style={S.adminLabel}>Product Link</div><input style={S.adminInput} value={newItem.link} onChange={e => setNewItem(p => ({ ...p, link: e.target.value }))} placeholder="https://…" /></div>
              </div>
              <div style={{ marginTop: "12px", display: "flex", gap: "8px", alignItems: "center" }}>
                <label style={{ fontSize: "0.78rem", color: "#6B6B65", display: "flex", gap: "6px", alignItems: "center" }}>
                  <input type="checkbox" checked={newItem.large} onChange={e => setNewItem(p => ({ ...p, large: e.target.checked }))} />
                  Large item (requires pickup)
                </label>
                <button onClick={addItem} style={S.adminAddBtn}>Add Item</button>
                <button onClick={() => setShowAddForm(false)} style={S.adminDeleteBtn}>Cancel</button>
              </div>
            </div>
          )}

          {/* Drag-and-drop item grid */}
          <div style={S.adminGrid}>
            {visibleItems.map(item => (
              <div key={item.id}
                style={{ ...S.adminCard, cursor: "grab", borderTop: "2px solid transparent" }}
                draggable
                onDragStart={e => { e.dataTransfer.setData("itemId", String(item.id)); e.currentTarget.style.opacity = "0.5"; }}
                onDragEnd={e => { e.currentTarget.style.opacity = "1"; e.currentTarget.style.borderTop = "2px solid transparent"; }}
                onDragOver={e => { e.preventDefault(); e.currentTarget.style.borderTop = "2px solid #C4522A"; }}
                onDragLeave={e => { e.currentTarget.style.borderTop = "2px solid transparent"; }}
                onDrop={e => {
                  e.preventDefault();
                  e.currentTarget.style.borderTop = "2px solid transparent";
                  const fromId = Number(e.dataTransfer.getData("itemId"));
                  const toId = item.id;
                  if (fromId === toId) return;
                  setLocalItems(prev => {
                    const arr = [...prev];
                    const fromIdx = arr.findIndex(i => i.id === fromId);
                    const toIdx = arr.findIndex(i => i.id === toId);
                    if (fromIdx === -1 || toIdx === -1) return prev;
                    const [moved] = arr.splice(fromIdx, 1);
                    arr.splice(toIdx, 0, moved);
                    return arr;
                  });
                  markDirty();
                }}
              >
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start", gap: "8px" }}>
                  <div style={{ fontSize: "0.72rem", color: "#B0A898", marginTop: "2px", flexShrink: 0 }}>⠿</div>
                  <div style={{ flex: 1 }}>
                    <div style={S.adminLabel}>Name</div>
                    <input style={{ ...S.adminInput, fontWeight: 500 }} value={item.name}
                      onChange={e => updateItem(item.id, "name", e.target.value)} />
                  </div>
                  <button onClick={() => deleteItem(item.id)} style={{ ...S.adminDeleteBtn, flexShrink: 0, marginTop: "18px" }}>✕</button>
                </div>
                <div>
                  <div style={S.adminLabel}>Room / Category</div>
                  <input style={S.adminInput} list="room-options-edit" value={item.room}
                    onChange={e => updateItem(item.id, "room", e.target.value)} placeholder="Select or type new" />
                  <datalist id="room-options-edit">{allRooms.map(r => <option key={r} value={r} />)}</datalist>
                </div>
                <div>
                  <div style={S.adminLabel}>Status</div>
                  <select style={S.adminSelect} value={item.status} onChange={e => updateItem(item.id, "status", e.target.value)}>
                    <option value="available">Available</option>
                    <option value="deposit">Deposit Taken</option>
                    <option value="sold">Sold</option>
                  </select>
                </div>
                <div style={S.adminRow}>
                  <div><div style={S.adminLabel}>Sale Price $</div><input style={S.adminInput} type="number" value={item.sale} onChange={e => updateItem(item.id, "sale", Number(e.target.value))} /></div>
                  <div><div style={S.adminLabel}>Deposit $</div><input style={S.adminInput} type="number" value={item.deposit} onChange={e => updateItem(item.id, "deposit", Number(e.target.value))} /></div>
                </div>
                <div><div style={S.adminLabel}>Photo URL</div><input style={S.adminInput} value={item.photo} onChange={e => updateItem(item.id, "photo", normalizeUrl(e.target.value))} placeholder="https://… (Dropbox auto-converted)" /></div>
                <div><div style={S.adminLabel}>Product Link</div><input style={S.adminInput} value={item.link} onChange={e => updateItem(item.id, "link", e.target.value)} placeholder="https://…" /></div>
                <label style={{ fontSize: "0.75rem", color: "#6B6B65", display: "flex", gap: "6px", alignItems: "center" }}>
                  <input type="checkbox" checked={item.large} onChange={e => updateItem(item.id, "large", e.target.checked)} />
                  Large item (requires deposit + pickup)
                </label>
              </div>
            ))}
          </div>

          <div style={{ padding: "20px", textAlign: "center" }}>
            <button onClick={handleSave} disabled={saveState === "saving" || (!isDirty && saveState !== "error")}
              style={{ ...S.adminSaveBtn(saveState), padding: "10px 32px", fontSize: "0.85rem", opacity: (!isDirty && saveState === "idle") ? 0.5 : 1 }}>
              {saveBtnLabel}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── MOUNT ────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary>
    <App />
  </ErrorBoundary>
);
</script>
</body>
</html>
